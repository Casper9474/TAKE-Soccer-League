info:
  name: add
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/goal
  body:
    type: json
    data: |-
      {
        "match": { "id": 1 },
        "player": { "id": 1 },
        "minute": 10,
        "goalType": "NORMAL"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
